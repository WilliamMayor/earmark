services:
  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: localhost:5000/web-prod:latest
    profiles: ["deploy"]
    ports:
      - "8001:3000"
    environment:
      DB_PATH: /data/transactions.db
      ORIGIN: http://localhost:8001
    volumes:
      - ./data:/data
    restart: unless-stopped

  sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: sync-runtime
    image: localhost:5000/sync:latest
    profiles: ["deploy", "dev"]
    volumes:
      - ./data:/data
    environment:
      DB_PATH: /data/transactions.db
    env_file:
      - .env
    ports:
      - "8002:8080"
    restart: unless-stopped

  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-dev
    profiles: ["dev"]
    ports:
      - "5173:5173"
    environment:
      DB_PATH: /data/transactions.db
      ORIGIN: http://localhost:5173
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ./data:/data

volumes:
  web_node_modules: