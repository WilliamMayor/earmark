name: earmark-dev

services:
    sync:
        build:
            context: .
            dockerfile: Dockerfile
            target: sync-runtime
        image: localhost:5000/earmark/sync:latest
        profiles: ["deploy"]
        volumes:
            - /home/deploybot/earmark/data:/data
        environment:
            DB_PATH: /data/transactions.db
        env_file:
            - .env
        restart: unless-stopped

    web:
        build:
            context: .
            dockerfile: Dockerfile
            target: web-runtime
        image: localhost:5000/earmark/web:latest
        profiles: ["deploy"]
        ports:
            - "8090:3000"
        environment:
            DB_PATH: /data/transactions.db
            ORIGIN: http://kiosk:8090
        volumes:
            - /home/deploybot/earmark/data:/data
        restart: unless-stopped
