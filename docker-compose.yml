services:
  web-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: localhost:5000/web-prod:latest
    profiles: ["deploy"]
    ports:
      - "8001:3000"
    environment:
      DB_PATH: /data/transactions.db
      ORIGIN: http://localhost:8001
    volumes:
      - ./data:/data
    restart: unless-stopped

  sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: sync-runtime
    image: localhost:5000/sync:latest
    profiles: ["deploy", "dev"]
    volumes:
      - ./data:/data
    environment:
      DB_PATH: /data/transactions.db
    env_file:
      - .env
    ports:
      - "8002:8080"
    restart: unless-stopped

  web-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-dev
    profiles: ["dev"]
    ports:
      - "5173:5173"
    environment:
      DB_PATH: /data/transactions.db
      ORIGIN: http://localhost:5173
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ./data:/data

  web-unit:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-dev
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - ./migrations:/migrations
    working_dir: /app
    command: npm test

  web-e2e:
    build:
      context: .
      dockerfile: Dockerfile
      target: e2e-test
    working_dir: /app
    command: npx playwright test

  python-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: sync-runtime
    volumes:
      - ./sync:/app/sync
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    working_dir: /app
    command: uv run pytest

volumes:
  web_node_modules: