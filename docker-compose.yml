services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "3000:3000"
    environment:
      DB_PATH: /data/transactions.db
      ORIGIN: http://localhost:3000
    volumes:
      - ./data:/data
    restart: unless-stopped

  # The Python sync tool is a one-shot command, not a long-running service.
  # Usage: docker compose --profile sync run --rm sync
  sync:
    image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    working_dir: /app
    command: ["uv", "run", "python", "-m", "sync"]
    volumes:
      - .:/app
      - ./data:/data
    environment:
      DB_PATH: /data/transactions.db
    env_file:
      - .env
    profiles:
      - sync

  sync-cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: sync-cron
    volumes:
      - .:/app
      - ./data:/data
    environment:
      DB_PATH: /data/transactions.db
    env_file:
      - .env
    restart: unless-stopped
