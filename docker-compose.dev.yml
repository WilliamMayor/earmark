services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
            target: web-dev
        profiles: ["dev"]
        ports:
            - "127.0.0.1:5173:5173"
        environment:
            DB_PATH: /data/transactions.db
            ORIGIN: http://localhost:5173
        volumes:
            - ./web:/app
            - web_node_modules:/app/node_modules
            - ./data:/data

    sync:
        build:
            context: .
            dockerfile: Dockerfile
            target: sync-runtime
        profiles: ["dev"]
        volumes:
            - ./data:/data
        environment:
            DB_PATH: /data/transactions.db
        env_file:
            - .env
        ports:
            - "8002:8080"
        restart: unless-stopped

    test-web:
        build:
            context: .
            dockerfile: Dockerfile
            target: web-dev
        profiles: ["test"]
        volumes:
            - ./web:/app
            - web_node_modules:/app/node_modules
            - ./migrations:/migrations
        working_dir: /app
        command: npm test

    test-e2e:
        build:
            context: .
            dockerfile: Dockerfile
            target: test-e2e
        profiles: ["test"]
        working_dir: /app
        command: npx playwright test

    test-sync:
        build:
            context: .
            dockerfile: Dockerfile
            target: sync-runtime
        profiles: ["test"]
        volumes:
            - ./sync:/app/sync
            - ./tests:/app/tests
            - ./migrations:/app/migrations
            - ./pyproject.toml:/app/pyproject.toml
            - ./uv.lock:/app/uv.lock
        working_dir: /app
        command: uv run pytest

volumes:
    web_node_modules:
